# Railway service config for the VoyageAI backend.
# Point the service at this file via Dashboard → Settings → Source → Config path.

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# Mount a persistent volume at /data so the SQLite file and Chroma index
# survive redeploys. Create the volume in Railway dashboard and attach it
# to this service at mount path /data.
